<div class="upload-container">
  <div class="upload-card">
    <div class="upload-header">
      <h1><i class="fa-solid fa-cloud-arrow-up"></i> CSV Data Importer</h1>
      <p>Upload your file and watch the processing happen in real time.</p>
    </div>

    <div class="upload-area"
         [class.drag-over]="isDragOver()"
         (dragover)="onDragOver($event)"
         (dragleave)="onDragLeave($event)"
         (drop)="onDrop($event)"
         (click)="fileInput.click()">
      <div class="upload-icon">
        <i class="fa-solid fa-file-csv"></i>
      </div>

      @if (!selectedFile()) {
      <p class="upload-text">Drop your CSV here or <span>browse</span></p>
      <p class="upload-hint">Only .csv files are supported</p>
      } @else {
      <div class="file-info">
        <p class="upload-text selected">{{ selectedFile()!.name }}</p>
        <p class="upload-hint">{{ (selectedFile()!.size / 1024).toFixed(1) }} KB</p>
        <button class="remove-file" (click)="removeFile($event)" aria-label="Remove file">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      }

      <input type="file"
             accept=".csv"
             (change)="onFileSelected($event)"
             #fileInput
             hidden />
    </div>

    <button class="btn-primary"
            (click)="onUpload()"
            [disabled]="!selectedFile() || uploading()">
      @if (!uploading()) {
      <i class="fa-solid fa-play"></i> Start Processing
      } @else {
      <span class="spinner"></span> Uploading…
      }
    </button>
  </div>
</div>
